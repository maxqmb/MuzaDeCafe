<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Sellers — Muza De Cafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Mea+Culpa&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="media/logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-transition">

  <!-- HEADER -->
  <header id="site-header" class="scrolled">
    <div class="logo">
      <a href="index.html"><img src="media/logo.png" alt="Muza De Cafe Logo" /></a>
    </div>
    <nav class="navbar navbar-expand-lg">
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="best-sellers.html">Best Sellers</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="review.html">Review</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <p class="section-label" style="display:block; text-align:center;">Our favourites</p>
    <h1 class="section-title">Best Sellers</h1>
  </div>

  <!-- BEST SELLERS -->
  <section class="best-sellers-section">
    <div class="container">

      <!-- Drinks -->
      <p class="category-label reveal">Signature Drinks</p>
      <div class="row mb-5">
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.05s">
          <div class="drink-card">
            <img src="media/strawberry.jpg" alt="Strawberry Drink" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">Strawberry Bliss</span>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.15s">
          <div class="drink-card">
            <img src="media/matcha.jpg" alt="Matcha Drink" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">Matcha Cloud</span>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.25s">
          <div class="drink-card">
            <img src="media/hazelnut.jpg" alt="Hazelnut Drink" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">Hazelnut Dream</span>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.35s">
          <div class="drink-card">
            <img src="media/mocha.jpg" alt="Mocha Drink" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">Classic Mocha</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Food -->
      <p class="category-label reveal" style="transition-delay:0.1s">Kitchen Favourites</p>
      <div class="row">
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.05s">
          <div class="drink-card">
            <img src="media/volcano.JPG" alt="Volcano" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">Volcano</span>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.15s">
          <div class="drink-card">
            <img src="media/maki.jpg" alt="Maki" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">Maki Roll</span>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.25s">
          <div class="drink-card">
            <img src="media/ramen.JPG" alt="Ramen" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">House Ramen</span>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-sm-6 mb-4 reveal" style="transition-delay:0.35s">
          <div class="drink-card">
            <img src="media/tuna.JPG" alt="Tuna" />
            <div class="drink-card-overlay">
              <span class="drink-card-name">Tuna Special</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div>
      <div class="footer-brand">Muza De Cafe</div>
      <div class="footer-copy">© 2024 Muza De Cafe. All rights reserved.</div>
    </div>
    <div class="social-icons">
      <a href="https://www.facebook.com/MuzadeCafe" aria-label="Facebook">
        <img src="media/facebook.png" alt="Facebook" />
      </a>
      <a href="https://www.instagram.com/muzadecafe.cpn?igsh=MXdudG52OHF5b2Uydw==" aria-label="Instagram">
        <img src="media/instagram.png" alt="Instagram" />
      </a>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.6.0.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script>
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 20);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => observer.observe(el));
  </script>
</body>
</html>
